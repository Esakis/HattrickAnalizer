<div class="app-container">
  <header class="app-header">
    <div class="team-switcher" *ngIf="accountTeams.length > 1">
      <span class="team-switcher-label">{{ 'teamSwitcher.label' | translate }}</span>
      <button
        *ngFor="let t of accountTeams"
        class="team-btn"
        [class.active]="t.teamId === currentTeamId"
        [disabled]="switchingTeam"
        [title]="t.leagueName"
        (click)="switchTeam(t.teamId)">
        {{ t.teamName }}
      </button>
    </div>
    <div class="language-switcher">
      <button
        class="lang-btn"
        [class.active]="getCurrentLanguage() === 'pl'"
        (click)="switchLanguage('pl')">
        PL
      </button>
      <button
        class="lang-btn"
        [class.active]="getCurrentLanguage() === 'en'"
        (click)="switchLanguage('en')">
        EN
      </button>
    </div>
  </header>
  <div class="app-body">
    <main class="app-content">
      <div *ngIf="showMockBanner" class="auth-banner mock-banner">
        <span>{{ 'loadStatus.mockMode' | translate }}</span>
      </div>
      <div *ngIf="showAuthBanner" class="auth-banner">
        <span>{{ 'loadStatus.notAuthorized' | translate }}</span>
        <button class="auth-banner__btn" (click)="goToOAuth()">
          {{ 'loadStatus.goToOAuth' | translate }}
        </button>
      </div>
      <router-outlet></router-outlet>
    </main>
    <app-load-status-sidebar class="app-sidebar"></app-load-status-sidebar>
  </div>
</div>
